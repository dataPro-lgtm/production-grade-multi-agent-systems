<text x="70" y="76" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="43" font-weight="760" fill="#1e3a5f" text-anchor="start" opacity="1"><tspan x="70" dy="0">多 Agent 架构，先回答五个控制问题</tspan></text><path d="M 70 94 C 260 88, 470 101, 680 93" fill="none" stroke="#d59621" stroke-width="7" stroke-linecap="round" opacity=".85"/><text x="72" y="128" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="23" font-weight="500" fill="#55708f" text-anchor="start" opacity="1"><tspan x="72" dy="0">模式名称只是表象；真正决定系统行为的是控制与责任。</tspan></text>
