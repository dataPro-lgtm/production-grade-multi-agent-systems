<text x="800" y="446" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="31" font-weight="500" fill="#55708f" text-anchor="middle" opacity="1"><tspan x="800" dy="0">分布式控制系统</tspan></text>
