<rect x="715" y="235" width="210" height="52" rx="26" fill="#f7e7b8" stroke="#d59621" stroke-width="2.4"/><rect x="717" y="234" width="209" height="53" rx="27" fill="none" stroke="#d59621" stroke-width="1.2" opacity=".32" transform="rotate(.18 820 261)"/><text x="820" y="269" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="24" font-weight="650" fill="#d59621" text-anchor="middle" opacity="1"><tspan x="820" dy="0">责任变化</tspan></text>
<text x="820" y="330" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="27" font-weight="650" fill="#d59621" text-anchor="middle" opacity="1"><tspan x="820" dy="0">控制权切换</tspan><tspan x="820" dy="34.56">Handoff</tspan><tspan x="820" dy="34.56">Supervisor</tspan></text>
<text x="820" y="485" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="22" font-weight="500" fill="#55708f" text-anchor="middle" opacity="1"><tspan x="820" dy="0">移交当前责任</tspan><tspan x="820" dy="28.16">或保留全局责任</tspan><tspan x="820" dy="28.16">所有权必须明确</tspan></text>
