<rect x="1305" y="235" width="210" height="52" rx="26" fill="#f7dddd" stroke="#c94c4c" stroke-width="2.4"/><rect x="1307" y="234" width="209" height="53" rx="27" fill="none" stroke="#c94c4c" stroke-width="1.2" opacity=".32" transform="rotate(.18 1410 261)"/><text x="1410" y="269" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="24" font-weight="650" fill="#c94c4c" text-anchor="middle" opacity="1"><tspan x="1410" dy="0">组织复杂</tspan></text>
<text x="1410" y="330" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="25" font-weight="650" fill="#c94c4c" text-anchor="middle" opacity="1"><tspan x="1410" dy="0">组织与元模式</tspan><tspan x="1410" dy="32">Hierarchical</tspan><tspan x="1410" dy="32">Semantic Consensus</tspan></text>
<text x="1410" y="485" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="22" font-weight="500" fill="#55708f" text-anchor="middle" opacity="1"><tspan x="1410" dy="0">分层团队与汇总</tspan><tspan x="1410" dy="28.16">证据独立性优先</tspan><tspan x="1410" dy="28.16">不是简单多数票</tspan></text>
<text x="800" y="812" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="25" font-weight="650" fill="#1e3a5f" text-anchor="middle" opacity="1"><tspan x="800" dy="0">选择原则：使用能够满足约束的最小动态结构；新增模式必须用质量、延迟、成本或风险收益证明。</tspan></text>

