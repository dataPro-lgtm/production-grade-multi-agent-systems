<text x="210" y="330" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="27" font-weight="650" fill="#1e3a5f" text-anchor="middle" opacity="1"><tspan x="210" dy="0">确定性流水线</tspan><tspan x="210" dy="34.56">Sequential</tspan><tspan x="210" dy="34.56">Chain-of-Agents</tspan></text>
<text x="210" y="485" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="22" font-weight="500" fill="#55708f" text-anchor="middle" opacity="1"><tspan x="210" dy="0">路径由代码决定</tspan><tspan x="210" dy="28.16">可预测 · 易测试</tspan><tspan x="210" dy="28.16">适合稳定步骤</tspan></text>
