<rect x="410" y="235" width="210" height="52" rx="26" fill="#e9e0f4" stroke="#7651a6" stroke-width="2.4"/><rect x="412" y="234" width="209" height="53" rx="27" fill="none" stroke="#7651a6" stroke-width="1.2" opacity=".32" transform="rotate(.18 515 261)"/><text x="515" y="269" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="24" font-weight="650" fill="#7651a6" text-anchor="middle" opacity="1"><tspan x="515" dy="0">探索问题</tspan></text>
<text x="515" y="330" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="27" font-weight="650" fill="#7651a6" text-anchor="middle" opacity="1"><tspan x="515" dy="0">搜索与审议</tspan><tspan x="515" dy="34.56">Tree-of-Thoughts</tspan><tspan x="515" dy="34.56">Magentic</tspan></text>
<text x="515" y="485" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="22" font-weight="500" fill="#55708f" text-anchor="middle" opacity="1"><tspan x="515" dy="0">探索、评分、重规划</tspan><tspan x="515" dy="28.16">必须限制宽度深度</tspan><tspan x="515" dy="28.16">目标合同保持不变</tspan></text>
