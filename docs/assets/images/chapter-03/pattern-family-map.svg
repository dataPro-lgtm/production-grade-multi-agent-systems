<text x="70" y="76" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="43" font-weight="760" fill="#1e3a5f" text-anchor="start" opacity="1"><tspan x="70" dy="0">模式不是菜单，而是五类控制结构</tspan></text><path d="M 70 94 C 260 88, 470 101, 680 93" fill="none" stroke="#d59621" stroke-width="7" stroke-linecap="round" opacity=".85"/><text x="72" y="128" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="23" font-weight="500" fill="#55708f" text-anchor="start" opacity="1"><tspan x="72" dy="0">同一系统可以组合模式；每一层都要说明它解决了什么问题。</tspan></text>
<rect x="70" y="205" width="280" height="540" rx="22" fill="#fffdf7" stroke="#1e3a5f" stroke-width="3"/><rect x="72" y="204" width="279" height="541" rx="23" fill="none" stroke="#1e3a5f" stroke-width="1.2" opacity=".32" transform="rotate(.18 210 475)"/>
