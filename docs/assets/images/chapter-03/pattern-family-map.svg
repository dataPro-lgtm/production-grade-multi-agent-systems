<text x="1125" y="330" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="27" font-weight="650" fill="#3c8d77" text-anchor="middle" opacity="1"><tspan x="1125" dy="0">并行聚合</tspan><tspan x="1125" dy="34.56">Router</tspan><tspan x="1125" dy="34.56">Fan-Out / Join</tspan></text>
<text x="1125" y="485" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="22" font-weight="500" fill="#55708f" text-anchor="middle" opacity="1"><tspan x="1125" dy="0">并行缩短关键路径</tspan><tspan x="1125" dy="28.16">难点在 Join</tspan><tspan x="1125" dy="28.16">部分结果要有语义</tspan></text>
