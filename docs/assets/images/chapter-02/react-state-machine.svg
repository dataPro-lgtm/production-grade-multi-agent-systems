<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">CaseOps 受控 Agent 的显式状态机</title>
  <desc id="desc">从规划、工具提议、授权、执行、观察返回规划，并进入完成、人工、停止或失败终态；只读工具支持检查点恢复。</desc>
  <defs>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="17" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.1"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#1e3a5f" stroke-width="2.2"/>
    </marker>
    <style>
      .label{font-family:"Kaiti SC","STKaiti","Noto Sans SC",sans-serif;fill:#24364b}
      .title{font-size:42px;font-weight:700}.box-title{font-size:25px;font-weight:700}.body{font-size:19px}.small{font-size:17px}
      .flow{fill:none;stroke:#1e3a5f;stroke-width:4.5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
      .recover{fill:none;stroke:#7651a6;stroke-width:4.2;stroke-dasharray:11 8;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#fbfaf5"/>
  <path d="M55 92 C380 66 690 80 980 66 C1210 55 1420 69 1545 58" stroke="#d7d2c8" stroke-width="3" fill="none"/>
  <text x="80" y="72" class="label title">CaseOps：Planner 进入控制面后的显式状态</text>

  <g filter="url(#rough)">
    <rect x="45" y="235" width="185" height="135" rx="24" fill="#e8f2ff" stroke="#326da8" stroke-width="5"/>
    <rect x="285" y="235" width="205" height="135" rx="24" fill="#fff4d2" stroke="#d59621" stroke-width="5"/>
    <rect x="545" y="235" width="210" height="135" rx="24" fill="#fff0ef" stroke="#c94c4c" stroke-width="5"/>
    <rect x="810" y="235" width="210" height="135" rx="24" fill="#e7f5ed" stroke="#3c8d77" stroke-width="5"/>
    <rect x="1075" y="235" width="205" height="135" rx="24" fill="#e8f2ff" stroke="#326da8" stroke-width="5"/>
    <rect x="1335" y="235" width="220" height="135" rx="24" fill="#f4ebff" stroke="#7651a6" stroke-width="5"/>

    <rect x="150" y="590" width="260" height="125" rx="24" fill="#e7f5ed" stroke="#3c8d77" stroke-width="5"/>
    <rect x="490" y="590" width="260" height="125" rx="24" fill="#fff4d2" stroke="#d59621" stroke-width="5"/>
    <rect x="830" y="590" width="260" height="125" rx="24" fill="#fff0ef" stroke="#c94c4c" stroke-width="5"/>
    <rect x="1170" y="590" width="260" height="125" rx="24" fill="#ffffff" stroke="#c94c4c" stroke-width="5"/>
  </g>

  <text x="137" y="288" text-anchor="middle" class="label box-title">created</text>
  <text x="137" y="328" text-anchor="middle" class="label body">分配 run_id</text>
  <text x="387" y="288" text-anchor="middle" class="label box-title">planning</text>
  <text x="387" y="328" text-anchor="middle" class="label body">提议一项动作</text>
  <text x="650" y="288" text-anchor="middle" class="label box-title">tool_proposed</text>
  <text x="650" y="328" text-anchor="middle" class="label body">Schema · 指纹</text>
  <text x="915" y="288" text-anchor="middle" class="label box-title">tool_authorized</text>
  <text x="915" y="328" text-anchor="middle" class="label body">Scope · 资源 · 风险</text>
  <text x="1177" y="288" text-anchor="middle" class="label box-title">tool_running</text>
  <text x="1177" y="328" text-anchor="middle" class="label body">timeout · retry</text>
  <text x="1445" y="288" text-anchor="middle" class="label box-title">observing</text>
  <text x="1445" y="328" text-anchor="middle" class="label body">结果 · 错误 · 证据</text>

  <path d="M230 302 L285 302" class="flow"/>
  <path d="M490 302 L545 302" class="flow"/>
  <path d="M755 302 L810 302" class="flow"/>
  <path d="M1020 302 L1075 302" class="flow"/>
  <path d="M1280 302 L1335 302" class="flow"/>
  <path d="M1445 370 C1440 465 620 455 387 370" class="flow"/>

  <text x="280" y="642" text-anchor="middle" class="label box-title">completed</text>
  <text x="280" y="683" text-anchor="middle" class="label body">终态契约通过</text>
  <text x="620" y="642" text-anchor="middle" class="label box-title">needs_human</text>
  <text x="620" y="683" text-anchor="middle" class="label body">证据或授权不足</text>
  <text x="960" y="642" text-anchor="middle" class="label box-title">stopped</text>
  <text x="960" y="683" text-anchor="middle" class="label body">预算或重复熔断</text>
  <text x="1300" y="642" text-anchor="middle" class="label box-title">failed</text>
  <text x="1300" y="683" text-anchor="middle" class="label body">不可恢复错误</text>

  <path d="M387 370 C365 475 300 515 280 590" class="flow"/>
  <path d="M650 370 C650 470 630 520 620 590" class="flow"/>
  <path d="M915 370 C915 470 940 520 960 590" class="flow"/>
  <path d="M1177 370 C1190 470 1260 520 1300 590" class="flow"/>

  <path d="M1177 235 C1170 150 560 145 410 235" class="recover"/>
  <text x="790" y="155" text-anchor="middle" class="label body" fill="#7651a6">只读崩溃窗口：从最近 Checkpoint 重新规划</text>

  <path d="M80 795 C390 780 700 800 1010 786 C1240 777 1420 793 1520 783" stroke="#d7d2c8" stroke-width="3" fill="none"/>
  <text x="800" y="840" text-anchor="middle" class="label box-title" fill="#9d3030">合法转移 · 最大步数 · 动作指纹 · 超时 · 重试，都由运行时强制</text>
</svg>
