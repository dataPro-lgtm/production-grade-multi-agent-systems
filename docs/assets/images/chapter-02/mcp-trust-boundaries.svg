<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">CaseOps MCP 双重信任边界</title>
  <desc id="desc">API Host 先根据用户身份与任务授权，签发短期任务令牌；MCP Server 再验证令牌、租户、任务、作用域和资源，模型参数不包含租户。</desc>
  <defs>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="31" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.1"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#1e3a5f" stroke-width="2.2"/>
    </marker>
    <style>
      .label{font-family:"Kaiti SC","STKaiti","Noto Sans SC",sans-serif;fill:#24364b}
      .title{font-size:42px;font-weight:700}.box-title{font-size:28px;font-weight:700}.body{font-size:20px}.small{font-size:18px}
      .flow{fill:none;stroke:#1e3a5f;stroke-width:4.5;stroke-linecap:round;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#fbfaf5"/>
  <path d="M55 92 C380 66 690 80 980 66 C1210 55 1420 69 1545 58" stroke="#d7d2c8" stroke-width="3" fill="none"/>
  <text x="80" y="72" class="label title">双重授权：协议连通以后，还要验证资源边界</text>

  <g filter="url(#rough)">
    <rect x="55" y="170" width="400" height="560" rx="30" fill="#fff4d2" stroke="#d59621" stroke-width="5"/>
    <rect x="520" y="235" width="250" height="170" rx="24" fill="#e8f2ff" stroke="#326da8" stroke-width="5"/>
    <rect x="520" y="500" width="250" height="170" rx="24" fill="#f4ebff" stroke="#7651a6" stroke-width="5"/>
    <rect x="845" y="170" width="420" height="560" rx="30" fill="#e7f5ed" stroke="#3c8d77" stroke-width="5"/>
    <rect x="1330" y="260" width="220" height="380" rx="28" fill="#e8f2ff" stroke="#326da8" stroke-width="5"/>
  </g>

  <text x="255" y="225" text-anchor="middle" class="label box-title">CaseOps API / MCP Host</text>
  <text x="100" y="295" class="label body">① API Key → Principal</text>
  <text x="100" y="340" class="label body">② 锁定 tenant_id 与 case_id</text>
  <text x="100" y="385" class="label body">③ Tool allowlist 与 Scope</text>
  <text x="100" y="430" class="label body">④ 风险、预算、动作指纹</text>
  <text x="100" y="475" class="label body">⑤ 只把最小工具交给 Planner</text>
  <text x="255" y="590" text-anchor="middle" class="label box-title" fill="#9d3030">Host 授权边界</text>
  <text x="255" y="635" text-anchor="middle" class="label small">模型只能提议，不能声明身份</text>

  <text x="645" y="292" text-anchor="middle" class="label box-title">MCP Client</text>
  <text x="645" y="337" text-anchor="middle" class="label body">initialize · list · call</text>
  <text x="645" y="375" text-anchor="middle" class="label small">Streamable HTTP</text>

  <text x="645" y="548" text-anchor="middle" class="label box-title">短期任务令牌</text>
  <text x="645" y="590" text-anchor="middle" class="label small">aud · tenant · task · sub</text>
  <text x="645" y="622" text-anchor="middle" class="label small">scope · iat · nbf · exp · jti</text>

  <text x="1055" y="225" text-anchor="middle" class="label box-title">CaseOps MCP Tool Server</text>
  <text x="900" y="295" class="label body">① 验证签名、issuer 与 audience</text>
  <text x="900" y="340" class="label body">② 从令牌读取 tenant 与 task</text>
  <text x="900" y="385" class="label body">③ 逐工具检查 required scope</text>
  <text x="900" y="430" class="label body">④ 参数与业务规则再校验</text>
  <text x="900" y="475" class="label body">⑤ 结构化结果与 evidence_ref</text>
  <text x="1055" y="590" text-anchor="middle" class="label box-title" fill="#9d3030">Server 资源边界</text>
  <text x="1055" y="635" text-anchor="middle" class="label small">协议连通 ≠ 有权读取数据</text>

  <text x="1440" y="330" text-anchor="middle" class="label box-title">PostgreSQL</text>
  <text x="1440" y="385" text-anchor="middle" class="label body">案件 · 规则</text>
  <text x="1440" y="425" text-anchor="middle" class="label body">来源材料 · 别名</text>
  <text x="1440" y="485" text-anchor="middle" class="label small">查询必须包含</text>
  <text x="1440" y="520" text-anchor="middle" class="label small">verified tenant_id</text>

  <path d="M455 320 L520 320" class="flow"/>
  <path d="M645 405 L645 500" class="flow"/>
  <path d="M770 585 C815 555 820 360 845 330" class="flow"/>
  <path d="M1265 400 L1330 400" class="flow"/>

  <rect x="230" y="770" width="1140" height="72" rx="28" fill="#fff0ef" stroke="#c94c4c" stroke-width="4" filter="url(#rough)"/>
  <text x="800" y="816" text-anchor="middle" class="label box-title" fill="#9d3030">工具参数没有 tenant_id；凭据不进入 Prompt，也不向下游透传</text>
</svg>
