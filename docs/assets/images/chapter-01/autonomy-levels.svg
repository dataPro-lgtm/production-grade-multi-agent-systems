<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">L0 到 L5 自治连续谱</title>
  <desc id="desc">系统自治从固定规则逐步上升到长期自主，能力与风险同步增加，L2 到 L3 是企业常见的受约束自治区间。</desc>
  <defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency=".014" numOctaves="2" seed="11" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="2"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10" fill="none" stroke="#1e3a5f" stroke-width="2"/></marker>
    <style>
      .t{font-family:"Kaiti SC","STKaiti","Noto Sans SC",sans-serif;fill:#24364b}
      .h1{font-size:42px;font-weight:700}.h2{font-size:27px;font-weight:700}.body{font-size:20px}.small{font-size:18px}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#fbfaf5"/>
  <text x="80" y="78" class="t h1">自治不是开关，而是一条连续谱</text>
  <path d="M105 690 C420 680 760 700 1490 672" stroke="#1e3a5f" stroke-width="6" fill="none" marker-end="url(#arrow)" stroke-linecap="round"/>
  <text x="114" y="742" class="t h2">确定性更强</text>
  <text x="1290" y="742" class="t h2">自主性更高</text>
  <text x="600" y="815" class="t h2" fill="#c94c4c">能力 ↑　同时意味着　风险 / 成本 / 测试空间 ↑</text>

  <g filter="url(#rough)">
    <rect x="85" y="250" width="220" height="350" rx="18" fill="#eef1f4" stroke="#6d7782" stroke-width="4"/>
    <rect x="330" y="230" width="220" height="370" rx="18" fill="#e8f2ff" stroke="#326da8" stroke-width="4"/>
    <rect x="575" y="190" width="220" height="410" rx="18" fill="#fff1bb" stroke="#d59621" stroke-width="5"/>
    <rect x="820" y="160" width="220" height="440" rx="18" fill="#fff1bb" stroke="#d59621" stroke-width="5"/>
    <rect x="1065" y="210" width="220" height="390" rx="18" fill="#f4ebff" stroke="#7651a6" stroke-width="4"/>
    <rect x="1310" y="250" width="220" height="350" rx="18" fill="#ffe9e5" stroke="#c94c4c" stroke-width="4"/>
  </g>

  <text x="195" y="310" text-anchor="middle" class="t h1">L0</text><text x="195" y="352" text-anchor="middle" class="t h2">固定规则</text>
  <text x="195" y="405" text-anchor="middle" class="t body">模型不参与</text><text x="195" y="440" text-anchor="middle" class="t body">路径与结果</text>

  <text x="440" y="290" text-anchor="middle" class="t h1">L1</text><text x="440" y="332" text-anchor="middle" class="t h2">局部生成</text>
  <text x="440" y="385" text-anchor="middle" class="t body">抽取 · 分类</text><text x="440" y="420" text-anchor="middle" class="t body">改写 · 总结</text>

  <text x="685" y="250" text-anchor="middle" class="t h1">L2</text><text x="685" y="292" text-anchor="middle" class="t h2">受控选择</text>
  <text x="685" y="345" text-anchor="middle" class="t body">有限候选动作</text><text x="685" y="380" text-anchor="middle" class="t body">代码负责执行</text>

  <text x="930" y="220" text-anchor="middle" class="t h1">L3</text><text x="930" y="262" text-anchor="middle" class="t h2">动态规划</text>
  <text x="930" y="315" text-anchor="middle" class="t body">根据反馈调整</text><text x="930" y="350" text-anchor="middle" class="t body">有预算和终止条件</text>

  <text x="1175" y="270" text-anchor="middle" class="t h1">L4</text><text x="1175" y="312" text-anchor="middle" class="t h2">多 Agent 协作</text>
  <text x="1175" y="365" text-anchor="middle" class="t body">委托 · 协商</text><text x="1175" y="400" text-anchor="middle" class="t body">并行 · 仲裁</text>

  <text x="1420" y="310" text-anchor="middle" class="t h1">L5</text><text x="1420" y="352" text-anchor="middle" class="t h2">长期自主</text>
  <text x="1420" y="405" text-anchor="middle" class="t body">主动触发</text><text x="1420" y="440" text-anchor="middle" class="t body">持续运行</text>

  <path d="M565 118 C700 80 920 82 1050 118" fill="none" stroke="#d59621" stroke-width="5" stroke-linecap="round"/>
  <text x="808" y="105" text-anchor="middle" class="t h2" fill="#b16c12">企业常见甜蜜点：L2—L3 受约束自治</text>
</svg>
