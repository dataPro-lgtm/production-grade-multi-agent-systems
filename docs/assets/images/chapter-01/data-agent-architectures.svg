<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Data Agent 三种候选架构</title>
  <desc id="desc">对比单体 Data Agent、确定性数据工作流和受约束多 Agent 三种架构及其适用条件。</desc>
  <defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="2" seed="31" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="2.1"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8" fill="none" stroke="#1e3a5f" stroke-width="2"/></marker>
    <style>.t{font-family:"Kaiti SC","STKaiti","Noto Sans SC",sans-serif;fill:#24364b}.h1{font-size:42px;font-weight:700}.h2{font-size:28px;font-weight:700}.b{font-size:20px}.s{font-size:18px}.line{stroke:#1e3a5f;stroke-width:4;fill:none;marker-end:url(#arr)}</style>
  </defs>
  <rect width="1800" height="1000" fill="#fbfaf5"/>
  <text x="70" y="70" class="t h1">同一个 Data Agent 需求，可以落成三种不同架构</text>

  <g filter="url(#rough)">
    <rect x="55" y="120" width="520" height="790" rx="24" fill="#e8f2ff" stroke="#326da8" stroke-width="5"/>
    <rect x="640" y="120" width="520" height="790" rx="24" fill="#fff4d2" stroke="#d59621" stroke-width="5"/>
    <rect x="1225" y="120" width="520" height="790" rx="24" fill="#e7f5ed" stroke="#3c8d77" stroke-width="5"/>
  </g>

  <text x="315" y="180" text-anchor="middle" class="t h2">A　单体 Data Agent</text>
  <text x="900" y="180" text-anchor="middle" class="t h2">B　确定性数据工作流</text>
  <text x="1485" y="180" text-anchor="middle" class="t h2">C　受约束多 Agent</text>

  <g filter="url(#rough)">
    <rect x="150" y="245" width="330" height="145" rx="18" fill="#ffffff" stroke="#326da8" stroke-width="4"/>
  </g>
  <text x="315" y="300" text-anchor="middle" class="t h2">一个 Agent</text>
  <text x="315" y="342" text-anchor="middle" class="t b">动态选择全部工具</text>
  <path d="M315 390 L315 450" class="line"/>
  <g>
    <rect x="95" y="460" width="135" height="72" rx="12" fill="#fff" stroke="#326da8" stroke-width="3"/>
    <rect x="248" y="460" width="135" height="72" rx="12" fill="#fff" stroke="#326da8" stroke-width="3"/>
    <rect x="401" y="460" width="135" height="72" rx="12" fill="#fff" stroke="#326da8" stroke-width="3"/>
    <rect x="150" y="555" width="135" height="72" rx="12" fill="#fff" stroke="#326da8" stroke-width="3"/>
    <rect x="345" y="555" width="135" height="72" rx="12" fill="#fff" stroke="#326da8" stroke-width="3"/>
  </g>
  <text x="162" y="505" text-anchor="middle" class="t s">元数据</text><text x="315" y="505" text-anchor="middle" class="t s">SQL</text><text x="468" y="505" text-anchor="middle" class="t s">统计</text>
  <text x="217" y="600" text-anchor="middle" class="t s">图表</text><text x="412" y="600" text-anchor="middle" class="t s">报告</text>
  <text x="315" y="700" text-anchor="middle" class="t h2">适合</text><text x="315" y="742" text-anchor="middle" class="t b">单领域 · 工具有限 · 只读</text>
  <text x="315" y="805" text-anchor="middle" class="t h2" fill="#c94c4c">主要风险</text><text x="315" y="847" text-anchor="middle" class="t b">工具选择与权限边界膨胀</text>

  <g fill="#fff" stroke="#d59621" stroke-width="3">
    <rect x="755" y="235" width="290" height="62" rx="12"/><rect x="755" y="325" width="290" height="62" rx="12"/>
    <rect x="755" y="415" width="290" height="62" rx="12"/><rect x="755" y="505" width="290" height="62" rx="12"/>
    <rect x="755" y="595" width="290" height="62" rx="12"/>
  </g>
  <text x="900" y="275" text-anchor="middle" class="t b">意图与指标解析</text><text x="900" y="365" text-anchor="middle" class="t b">元数据检索</text>
  <text x="900" y="455" text-anchor="middle" class="t b">SQL 生成与校验</text><text x="900" y="545" text-anchor="middle" class="t b">只读执行与分析</text>
  <text x="900" y="635" text-anchor="middle" class="t b">证据化报告</text>
  <path d="M900 297 L900 325 M900 387 L900 415 M900 477 L900 505 M900 567 L900 595" class="line"/>
  <text x="900" y="730" text-anchor="middle" class="t h2">适合</text><text x="900" y="772" text-anchor="middle" class="t b">固定指标问答 · 报表生成</text>
  <text x="900" y="835" text-anchor="middle" class="t h2" fill="#c94c4c">主要限制</text><text x="900" y="877" text-anchor="middle" class="t b">开放式下钻的适应性较弱</text>

  <g fill="#fff" stroke="#3c8d77" stroke-width="3">
    <rect x="1290" y="245" width="180" height="100" rx="14"/><rect x="1500" y="245" width="180" height="100" rx="14"/>
    <rect x="1290" y="400" width="180" height="100" rx="14"/><rect x="1500" y="400" width="180" height="100" rx="14"/>
  </g>
  <text x="1380" y="285" text-anchor="middle" class="t b">Metadata</text><text x="1380" y="320" text-anchor="middle" class="t s">Schema / Join</text>
  <text x="1590" y="285" text-anchor="middle" class="t b">SQL</text><text x="1590" y="320" text-anchor="middle" class="t s">只读与校验</text>
  <text x="1380" y="440" text-anchor="middle" class="t b">Analysis</text><text x="1380" y="475" text-anchor="middle" class="t s">动态下钻</text>
  <text x="1590" y="440" text-anchor="middle" class="t b">Evidence</text><text x="1590" y="475" text-anchor="middle" class="t s">证据核验</text>
  <path d="M1470 295 L1500 295 M1590 345 L1590 400 M1500 450 L1470 450 M1380 400 L1380 345" class="line"/>
  <g filter="url(#rough)"><rect x="1375" y="555" width="220" height="82" rx="16" fill="#fff1bb" stroke="#d59621" stroke-width="4"/></g>
  <text x="1485" y="605" text-anchor="middle" class="t h2">Supervisor</text>
  <text x="1485" y="700" text-anchor="middle" class="t h2">适合</text><text x="1485" y="742" text-anchor="middle" class="t b">跨域 · 权限隔离 · 独立扩缩容</text>
  <text x="1485" y="805" text-anchor="middle" class="t h2" fill="#c94c4c">主要代价</text><text x="1485" y="847" text-anchor="middle" class="t b">协调 · 状态 · 延迟 · 分布式故障</text>
</svg>
