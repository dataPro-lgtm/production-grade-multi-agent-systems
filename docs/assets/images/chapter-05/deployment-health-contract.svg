<text x="800" y="690" font-family="'Kaiti SC','STKaiti','Noto Sans SC',sans-serif" font-size="27" font-weight="700" fill="#1e3a5f" text-anchor="middle"><tspan x="800" dy="0">Readiness：低成本检查硬依赖与版本；Synthetic：低频验证端到端业务不变量。</tspan></text>
